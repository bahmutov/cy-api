name: ci
on: push

# trusted publisher
permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Install everything 📦
        # https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7.3.0
        with:
          runTests: false

      # make sure we did not leave "it.only" accidentally
      # https://github.com/bahmutov/stop-only
      - name: Catch "it.only" 🫴
        run: npm run stop-only

      - name: Run tests 🧪
        # https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7.3.0
        with:
          install: true
          build: npm run build
          start: npm start

  release:
    needs: [install-and-test]
    # trusted publisher
    permissions:
      id-token: write # Required for OIDC
      contents: write
      # allow publishing comments on issues and PRs
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Install everything 📦
        # https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v7.3.0
        with:
          runTests: false

      - name: Build dist 🏗
        run: npm run build

      - name: Semantic Release 🚀
        uses: cycjimmy/semantic-release-action@v6
        with:
          branch: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
